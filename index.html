<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tatang Dev - Monetloader Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: #eee; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .neon-green { color: #39FF14; text-shadow: 0 0 10px #39FF14; }
        .btn-neon { background: #39FF14; color: black; font-weight: bold; transition: 0.3s; }
        .btn-neon:hover { box-shadow: 0 0 20px #39FF14; transform: scale(1.05); }
    </style>
</head>
<body>

    <nav class="p-5 glass sticky top-0 z-50 flex justify-between items-center px-8">
        <h1 class="text-xl font-black italic neon-green">TATANG<span class="text-white font-normal text-sm">COMMUNITY</span></h1>
        <div class="flex gap-4">
            <a href="https://youtube.com/@tatanglua" class="hover:neon-green"><i class="fab fa-youtube text-xl"></i></a>
            <a href="https://discord.gg/linkmu" class="hover:neon-green"><i class="fab fa-discord text-xl"></i></a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6 mt-10">
        <div class="text-center mb-16">
            <h2 class="text-5xl font-extrabold mb-4 uppercase tracking-tighter">Monetloader <span class="neon-green italic">Scripting</span></h2>
            <p class="text-gray-400">Jasa scripting Monetloader SAMP Mobile. Request sepuasnya, no ribet.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="glass p-8 rounded-3xl border-l-4 border-[#39FF14]">
                <h3 class="text-xl font-bold mb-4 uppercase italic">Chat Admin</h3>
                <p class="text-xs text-gray-400 mb-6 font-bold uppercase tracking-widest">Kirim Request Script:</p>
                <textarea id="pesan-user" rows="4" class="w-full bg-black/40 border border-gray-800 p-4 rounded-xl mb-4 focus:outline-none focus:border-[#39FF14] text-sm" placeholder="Contoh: Bang, buatin script vehicle spawner yang bisa auto warp..."></textarea>
                <button onclick="kirimWA()" class="w-full btn-neon py-4 rounded-xl flex justify-center items-center gap-2">
                    <i class="fab fa-whatsapp text-xl"></i> KIRIM KE WHATSAPP
                </button>
            </div>

            <div class="glass p-8 rounded-3xl border-t-4 border-white/10 text-center">
                <h3 class="text-xl font-bold mb-2 uppercase">Custom Script</h3>
                <p class="text-3xl font-mono neon-green mb-6">Rp 50.000</p>
                <div class="space-y-3 mb-8 text-left text-xs text-gray-400 uppercase font-bold px-4">
                    <p><i class="fas fa-check text-green-500 mr-2"></i> Request Sepuasnya</p>
                    <p><i class="fas fa-check text-green-500 mr-2"></i> Anti-Error / Debugging</p>
                    <p><i class="fas fa-check text-green-500 mr-2"></i> No Obfuscation</p>
                </div>
                <button onclick="showPay()" class="w-full py-4 rounded-xl border border-white/20 hover:bg-white hover:text-black transition font-bold uppercase tracking-widest">Beli Sekarang</button>
            </div>
        </div>
    </main>

    <div id="modal-pay" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center p-6 z-[60]">
        <div class="glass p-10 rounded-[40px] max-w-sm w-full text-center border-[#39FF14] border shadow-[0_0_30px_rgba(57,255,20,0.2)]">
            <h3 class="neon-green font-bold text-xl mb-6 tracking-widest italic underline">PAYMENT METHOD</h3>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=081234567890" class="mx-auto rounded-2xl mb-6 border-4 border-white">
            <p class="text-[10px] text-gray-500 uppercase mb-1">Transfer DANA / QRIS</p>
            <p class="text-2xl font-black tracking-[0.2em]">0812-XXXX-XXXX</p>
            <button onclick="showPay()" class="mt-8 text-red-500 text-xs font-bold underline uppercase">Close</button>
        </div>
    </div>

    <script>
        // GANTI NOMOR WA KAMU DI SINI (Wajib pakai 62 di depan)
        const noWA = "6289515000822"; 

        function kirimWA() {
            const pesan = document.getElementById('pesan-user').value;
            if (pesan.trim() === "") {
                alert("Isi pesannya dulu bang!");
                return;
            }
            // Kirim ke WA dengan format pesan yang rapi
            const teksFull = `Halo Tatang Dev, saya mau request script:\n\n"${pesan}"`;
            window.open(`https://wa.me/${noWA}?text=${encodeURIComponent(teksFull)}`, '_blank');
        }

        function showPay() {
            document.getElementById('modal-pay').classList.toggle('hidden');
        }
    </script>
</body>
</html>
