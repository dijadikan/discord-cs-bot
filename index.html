<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WA Channel | Neon Hacker</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');

body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  background: black;
  color: #00ffcc;
  overflow-x: hidden;
}

/* Background animasi */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(120deg, #00ffcc22, #ff00ff22);
  animation: bgMove 6s infinite alternate;
  z-index: -1;
}

@keyframes bgMove {
  0% { filter: blur(40px); transform: scale(1); }
  100% { filter: blur(80px); transform: scale(1.2); }
}

h1 {
  text-align: center;
  margin: 30px 0;
  text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc;
}

/* Card */
.card {
  width: 320px;
  margin: 20px auto;
  padding: 20px;
  border-radius: 15px;
  background: rgba(0,0,0,0.6);
  border: 1px solid #00ffcc;
  box-shadow: 0 0 15px #00ffcc;
  transition: 0.3s;
  animation: fadeUp 1s ease;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px #00ffcc, 0 0 50px #ff00ff;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.emoji {
  font-size: 35px;
}

h3 {
  margin: 10px 0;
}

p {
  font-size: 13px;
  color: #aaa;
}

/* Button neon */
.btn {
  display: inline-block;
  margin-top: 12px;
  padding: 10px 18px;
  border: 1px solid #00ffcc;
  border-radius: 10px;
  color: #00ffcc;
  text-decoration: none;
  transition: 0.3s;
}

.btn:hover {
  background: #00ffcc;
  color: black;
  box-shadow: 0 0 20px #00ffcc;
}

/* Glitch text */
.glitch {
  position: relative;
  color: #00ffcc;
}

.glitch::before,
.glitch::after {
  content: attr(data-text);
  position: absolute;
  left: 0;
}

.glitch::before {
  color: #ff00ff;
  animation: glitch 0.3s infinite;
}

.glitch::after {
  color: #00ffff;
  animation: glitch 0.3s infinite reverse;
}

@keyframes glitch {
  0% { transform: translate(0); }
  20% { transform: translate(-2px, 2px); }
  40% { transform: translate(-2px, -2px); }
  60% { transform: translate(2px, 2px); }
  80% { transform: translate(2px, -2px); }
  100% { transform: translate(0); }
}

footer {
  text-align: center;
  margin: 30px 0;
  font-size: 12px;
  color: #555;
}
</style>
</head>

<body>

<h1 class="glitch" data-text="WA CHANNEL LIST">WA CHANNEL LIST</h1>

<div class="card">
  <div class="emoji">🔥</div>
  <h3>Script SAMP</h3>
  <p>Monetloader, LUA, script gratis</p>
  <a class="btn" href="https://whatsapp.com/channel/XXXXX" target="_blank">JOIN</a>
</div>

<div class="card">
  <div class="emoji">🎮</div>
  <h3>Gaming Zone</h3>
  <p>Info game & mod terbaru</p>
  <a class="btn" href="https://whatsapp.com/channel/YYYYY" target="_blank">JOIN</a>
</div>

<div class="card">
  <div class="emoji">💸</div>
  <h3>Info Cuan</h3>
  <p>Tips cari uang online</p>
  <a class="btn" href="https://whatsapp.com/channel/ZZZZZ" target="_blank">JOIN</a>
</div>

<footer>
  © 2026 - Neon Hacker Style ⚡
</footer>

</body>
</html>
