<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Tatang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hidden { display: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div id="admin-login" class="glass p-10 rounded-3xl w-full max-w-md text-center">
        <h2 class="text-2xl font-bold mb-6 text-green-500 uppercase tracking-widest">Admin Access</h2>
        <input type="email" id="email" placeholder="Email" class="w-full bg-black/50 border border-gray-700 p-3 rounded-lg mb-4 outline-none focus:border-green-500">
        <input type="password" id="pass" placeholder="Password" class="w-full bg-black/50 border border-gray-700 p-3 rounded-lg mb-6 outline-none focus:border-green-500">
        <button onclick="handleLogin()" class="w-full bg-green-600 text-black font-bold py-3 rounded-xl hover:bg-green-400 transition">LOGIN</button>
    </div>

    <div id="dashboard" class="hidden w-full max-w-6xl">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-2xl font-bold border-l-4 border-green-500 pl-4">DASHBOARD ADMIN TATANG</h1>
            <button onclick="location.reload()" class="bg-red-900/50 px-4 py-2 rounded text-xs">LOGOUT</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 glass p-6 rounded-2xl h-[500px] flex flex-col">
                <h3 class="font-bold mb-4 flex items-center gap-2"><span class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></span> Chat Member Aktif</h3>
                <div id="admin-chat" class="flex-grow overflow-y-auto mb-4 border-b border-gray-800 p-2 space-y-3">
                    <div class="bg-white/10 p-2 rounded-lg w-fit text-sm">User: Bang, request script auto-drive ada?</div>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="admin-input" class="flex-grow bg-black/50 border border-gray-700 p-2 rounded-lg outline-none" placeholder="Kirim jawaban...">
                    <button onclick="adminSend()" class="bg-green-600 px-6 py-2 rounded-lg text-black font-bold">BALAS</button>
                </div>
            </div>

            <div class="glass p-6 rounded-2xl space-y-6">
                <h3 class="font-bold text-green-500 underline">Pengaturan Website</h3>
                <div>
                    <label class="text-xs text-gray-400">NOMOR DANA</label>
                    <input type="text" value="0812-3456-7890" class="w-full bg-black/50 border border-gray-700 p-2 rounded text-sm mt-1">
                </div>
                <div>
                    <label class="text-xs text-gray-400">QRIS IMAGE URL</label>
                    <input type="text" placeholder="https://link-foto-qris.png" class="w-full bg-black/50 border border-gray-700 p-2 rounded text-sm mt-1">
                </div>
                <button class="w-full bg-white text-black font-bold py-2 rounded text-sm">SIMPAN PERUBAHAN</button>
                
                <div class="pt-6 border-t border-gray-800">
                    <p class="text-xs text-gray-500">Stats: 12 Pembelian Bulan Ini</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function handleLogin() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;

            if(e === "dikasalto5@gmail.com" && p === "admin") {
                document.getElementById('admin-login').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.body.classList.replace('items-center', 'items-start');
            } else {
                alert("Login Gagal!");
            }
        }

        function adminSend() {
            const input = document.getElementById('admin-input');
            const chatBox = document.getElementById('admin-chat');
            if(input.value.trim() !== "") {
                chatBox.innerHTML += `<div class="bg-green-600/20 p-2 rounded-lg ml-auto w-fit text-sm border border-green-500">Admin: ${input.value}</div>`;
                input.value = "";
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }
    </script>
</body>
</html>
